<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祝奇奇生日快乐！🎉</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
        .birthday-bg { background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); }
        .title { font-size: 5.5rem; text-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        
        /* 左下角小音乐图标 */
        .music-icon {
            position: fixed;
            bottom: 24px;
            left: 24px;
            width: 56px;
            height: 56px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #ec4899;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 50;
            transition: all 0.3s ease;
        }
        .music-icon:hover { transform: scale(1.15); }
        .music-icon.playing { 
            animation: pulse 1.5s infinite; 
            color: #22c55e;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(236, 72, 153, 0); }
            100% { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0); }
        }
    </style>
</head>
<body class="birthday-bg min-h-screen flex flex-col items-center justify-center text-center px-6 py-12 overflow-hidden">

    <!-- 超大标题（点击放彩带） -->
    <div id="titleDiv" class="mb-16 cursor-pointer">
        <h1 class="title text-white font-bold mb-4 flex items-center justify-center gap-6">
            🎉 祝奇奇生日快乐！🎂
        </h1>
        <p class="text-4xl text-white font-medium">今天是你的专属日子～</p>
    </div>

    <!-- 视频区域（醒目） -->
    <div class="max-w-3xl w-full bg-white rounded-3xl shadow-2xl p-10">
        <h2 class="text-5xl font-bold text-pink-600 mb-8 flex items-center justify-center gap-4">
            <i class="fas fa-video"></i> 奇奇的生日视频
        </h2>
        <div class="aspect-video rounded-3xl overflow-hidden bg-black shadow-inner">
            <video controls class="w-full h-full" autoplay muted loop>
                <source src="birthday-video.mp4" type="video/mp4">
                请确认已上传 birthday-video.mp4 文件
            </video>
        </div>
    </div>

    <!-- 左下角小音乐图标 -->
    <div id="musicIcon" class="music-icon">
        <i class="fas fa-music" id="musicIconInner"></i>
    </div>

    <!-- 隐藏的音频 -->
    <audio id="birthdaySong" loop>
        <source src="birthday-song.mp3" type="audio/mpeg">
    </audio>

    <!-- 页脚 -->
    <footer class="mt-20 text-white/70 text-sm">
        © 2026 献给奇奇的生日惊喜 · 完全本地静态网页
    </footer>

    <script>
        // 彩带函数
        function launchConfetti() {
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            setTimeout(() => confetti({ particleCount: 120, angle: 60, spread: 70, origin: { x: 0 } }), 200);
            setTimeout(() => confetti({ particleCount: 120, angle: 120, spread: 70, origin: { x: 1 } }), 400);
        }

        // 音乐控制
        let isPlaying = false;
        const audio = document.getElementById('birthdaySong');
        const musicIcon = document.getElementById('musicIcon');
        const iconInner = document.getElementById('musicIconInner');
        
        function toggleSong() {
            if (isPlaying) {
                audio.pause();
                musicIcon.classList.remove('playing');
                iconInner.classList.remove('fa-pause');
                iconInner.classList.add('fa-music');
            } else {
                audio.play();
                musicIcon.classList.add('playing');
                iconInner.classList.remove('fa-music');
                iconInner.classList.add('fa-pause');
            }
            isPlaying = !isPlaying;
        }

        // 页面加载后绑定事件
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('titleDiv').addEventListener('click', launchConfetti);
            musicIcon.addEventListener('click', toggleSong);
            launchConfetti(); // 自动放一次彩带
        });
    </script>

</body>
</html>
