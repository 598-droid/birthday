<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祝奇奇生日快乐！🎉</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
        .birthday-bg { background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); }
        .title { font-size: 4.5rem; text-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="birthday-bg min-h-screen flex flex-col items-center justify-center text-center px-6 py-12 overflow-hidden">

    <!-- 大标题 + 彩带 -->
    <div class="mb-12">
        <h1 class="title text-white font-bold mb-4 flex items-center justify-center gap-4">
            🎉 祝奇奇生日快乐！🎂
        </h1>
        <p class="text-3xl text-white font-medium">今天是你的专属日子～</p>
    </div>

    <!-- 生日快乐歌 -->
    <div class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl p-8 mb-12">
        <h2 class="text-3xl font-bold text-pink-600 mb-6 flex items-center justify-center gap-3">
            <i class="fas fa-music"></i> 播放生日快乐歌
        </h2>
        <div class="aspect-video rounded-2xl overflow-hidden shadow-inner">
            <iframe width="100%" height="100%" 
                    src="https://www.youtube.com/embed/oMEtryL1cLk" 
                    title="生日快乐歌（中文版）" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
            </iframe>
        </div>
        <p class="text-sm text-gray-500 mt-4">点击播放一起唱～（中文儿歌版，超可爱！）</p>
    </div>

    <!-- 视频区（你随时可以换成自己的视频） -->
    <div class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl p-8">
        <h2 class="text-3xl font-bold text-pink-600 mb-6 flex items-center justify-center gap-3">
            <i class="fas fa-video"></i> 观看生日视频
        </h2>
        <div class="aspect-video rounded-2xl overflow-hidden shadow-inner">
            <iframe width="100%" height="100%" 
                    src="https://www.youtube.com/embed/Zm5wE8lpq84" 
                    title="生日视频" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
            </iframe>
        </div>
        <p class="text-sm text-gray-500 mt-4">想换成自己的视频？把YouTube链接发给我，我马上改代码！</p>
    </div>

    <!-- 页脚 -->
    <footer class="mt-16 text-white/70 text-sm">
        © 2026 献给奇奇的生日惊喜 · 免费静态网页
    </footer>

    <!-- 自动彩带特效 -->
    <script>
        function launchConfetti() {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            setTimeout(() => confetti({ particleCount: 100, angle: 60, spread: 70, origin: { x: 0 } }), 300);
            setTimeout(() => confetti({ particleCount: 100, angle: 120, spread: 70, origin: { x: 1 } }), 600);
        }
        window.onload = launchConfetti;
    </script>

</body>
</html>
